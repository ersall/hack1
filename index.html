<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Apple Security</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        #terminal {
            padding: 15px;
            height: 100vh;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .red { color: #f00; }
        .yellow { color: #ff0; }
        .cyan { color: #0ff; }
        .magenta { color: #f0f; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,0,0,0.03);
            pointer-events: none;
            z-index: 999;
        }
        #fake-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 2px solid #f00;
            padding: 20px;
            text-align: center;
            z-index: 1000;
            border-radius: 12px;
            color: #f00;
            font-family: -apple-system, sans-serif;
            font-size: 16px;
            width: 90%;
            max-width: 320px;
        }
        #fake-popup button {
            background: #f00;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            margin-top: 15px;
            width: 100%;

    </style>
</head>

</script>
